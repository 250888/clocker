<!DOCTYPE html>
<html>
<head>
  <base href="/clocker/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Clocker - 用狭义相对论，根治拖延症。你的行动速度，决定你的时间流速。">
  <meta name="keywords" content="Clocker, 自律, 拖延症, 番茄钟, 专注, 时间管理, 相对论">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Clocker">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Clocker - 用狭义相对论，根治拖延症</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0A0A1A;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #6C5CE7 0%, #A29BFE 50%, #00CEC9 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #loading .logo {
      width: 80px;
      height: 80px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 24px;
      animation: fadeIn 0.6s ease-out;
    }
    #loading .title {
      color: white;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 2px;
      margin-bottom: 4px;
      animation: fadeIn 0.6s ease-out 0.1s both;
    }
    #loading .subtitle {
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      margin-bottom: 24px;
      animation: fadeIn 0.6s ease-out 0.2s both;
    }
    #loading .slogan {
      color: rgba(255, 255, 255, 0.8);
      font-size: 13px;
      animation: fadeIn 0.6s ease-out 0.3s both;
    }
    #loading .progress {
      margin-top: 32px;
      width: 160px;
      height: 3px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      overflow: hidden;
      animation: fadeIn 0.6s ease-out 0.4s both;
    }
    #loading .progress-bar {
      height: 100%;
      background: white;
      border-radius: 2px;
      animation: progress 2s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes progress {
      from { width: 0%; }
      to { width: 100%; }
    }
    #camera-preview {
      display: none;
      position: fixed;
      bottom: 16px;
      right: 16px;
      width: 200px;
      height: 150px;
      border-radius: 12px;
      border: 2px solid rgba(108, 92, 231, 0.6);
      overflow: hidden;
      z-index: 9999;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      pointer-events: none;
    }
    #camera-preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    #camera-preview .camera-label {
      position: absolute;
      top: 4px;
      left: 6px;
      background: rgba(0,0,0,0.5);
      color: #00CEC9;
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    #camera-preview .attention-indicator {
      position: absolute;
      bottom: 4px;
      right: 6px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00CEC9;
      box-shadow: 0 0 6px #00CEC9;
    }
    #camera-preview .attention-indicator.distracted {
      background: #FF6B6B;
      box-shadow: 0 0 6px #FF6B6B;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo">⏰</div>
    <div class="title">Clocker</div>
    <div class="subtitle">你才是钟</div>
    <div class="slogan">你的行动速度，决定你的时间流速</div>
    <div class="progress">
      <div class="progress-bar"></div>
    </div>
  </div>

  <div id="camera-preview">
    <video id="camera-video" autoplay playsinline muted></video>
    <div class="camera-label">注意力监控</div>
    <div class="attention-indicator" id="attention-dot"></div>
  </div>

  <script>
    window.clockerCamera = {
      stream: null,
      isRunning: false,
      start: async function() {
        try {
          this.stream = await navigator.mediaDevices.getUserMedia({
            video: { width: 320, height: 240, facingMode: 'user' },
            audio: false
          });
          var video = document.getElementById('camera-video');
          video.srcObject = this.stream;
          document.getElementById('camera-preview').style.display = 'block';
          this.isRunning = true;
          console.log('Clocker: Camera started for attention monitoring');
        } catch(e) {
          console.warn('Clocker: Camera not available:', e.message);
          this.isRunning = false;
        }
      },
      stop: function() {
        if (this.stream) {
          this.stream.getTracks().forEach(function(t) { t.stop(); });
          this.stream = null;
        }
        document.getElementById('camera-preview').style.display = 'none';
        this.isRunning = false;
      },
      setAttention: function(score) {
        var dot = document.getElementById('attention-dot');
        if (dot) {
          if (score > 0.6) {
            dot.className = 'attention-indicator';
          } else {
            dot.className = 'attention-indicator distracted';
          }
        }
      }
    };
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
