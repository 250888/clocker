<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Clocker - 用狭义相对论，根治拖延症。你的行动速度，决定你的时间流速。">
  <meta name="keywords" content="Clocker, 自律, 拖延症, 番茄钟, 专注, 时间管理, 相对论">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Clocker">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Clocker - 用狭义相对论，根治拖延症</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0A0A1A;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #6C5CE7 0%, #A29BFE 50%, #00CEC9 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #loading .logo {
      width: 80px;
      height: 80px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 24px;
      animation: fadeIn 0.6s ease-out;
    }
    #loading .title {
      color: white;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 2px;
      margin-bottom: 4px;
      animation: fadeIn 0.6s ease-out 0.1s both;
    }
    #loading .subtitle {
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      margin-bottom: 24px;
      animation: fadeIn 0.6s ease-out 0.2s both;
    }
    #loading .slogan {
      color: rgba(255, 255, 255, 0.8);
      font-size: 13px;
      animation: fadeIn 0.6s ease-out 0.3s both;
    }
    #loading .progress {
      margin-top: 32px;
      width: 160px;
      height: 3px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      overflow: hidden;
      animation: fadeIn 0.6s ease-out 0.4s both;
    }
    #loading .progress-bar {
      height: 100%;
      background: white;
      border-radius: 2px;
      animation: progress 2s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes progress {
      from { width: 0%; }
      to { width: 100%; }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo">⏰</div>
    <div class="title">Clocker</div>
    <div class="subtitle">你才是钟</div>
    <div class="slogan">你的行动速度，决定你的时间流速</div>
    <div class="progress">
      <div class="progress-bar"></div>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.flutterBootstrapConfig = {
      renderer: 'html'
    };
  </script>
</body>
</html>
