<!DOCTYPE html>
<html>
<head>
  <base href="/clocker/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Clocker - 鐢ㄧ浉瀵硅閲嶆柊瀹氫箟鏃堕棿绠＄悊">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Clocker">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <title>Clocker</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0a0a1a;
    }
    #camera-container {
      position: fixed;
      top: 8px;
      right: 8px;
      width: 160px;
      height: 120px;
      z-index: 10000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      border: 2px solid rgba(124,77,255,0.4);
      display: none;
      pointer-events: none;
    }
    #camera-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (let registration of registrations) { registration.unregister(); }
      }).catch(function() {});
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (let name of names) { caches.delete(name); }
        }).catch(function() {});
      }
    }
    window.startCamera = async function() {
      try {
        const video = document.getElementById('camera-video');
        const container = document.getElementById('camera-container');
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 320 }, height: { ideal: 240 } },
          audio: false
        });
        video.srcObject = stream;
        container.style.display = 'block';
        return true;
      } catch(e) {
        console.warn('Camera access denied:', e);
        return false;
      }
    };
    window.stopCamera = function() {
      const video = document.getElementById('camera-video');
      const container = document.getElementById('camera-container');
      if (video.srcObject) {
        video.srcObject.getTracks().forEach(function(t) { t.stop(); });
        video.srcObject = null;
      }
      container.style.display = 'none';
    };
    window.setCameraOpacity = function(opacity) {
      var container = document.getElementById('camera-container');
      if (container) container.style.opacity = opacity;
    };
    window.setCameraMirror = function(mirror) {
      var video = document.getElementById('camera-video');
      if (video) video.style.transform = mirror ? 'scaleX(-1)' : 'scaleX(1)';
    };
  </script>
</head>
<body>
  <div id="camera-container">
    <video id="camera-video" autoplay playsinline muted></video>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
