  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0A0A1A; }
    #loading {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #6C5CE7 0%, #A29BFE 50%, #00CEC9 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #loading .logo {
      width: 80px; height: 80px; background: rgba(255,255,255,0.15);
      border-radius: 20px; display: flex; align-items: center; justify-content: center;
      font-size: 40px; margin-bottom: 24px; animation: fadeIn 0.6s ease-out;
    }
    #loading .title { color: white; font-size: 28px; font-weight: bold; letter-spacing: 2px; margin-bottom: 4px; animation: fadeIn 0.6s ease-out 0.1s both; }
    #loading .subtitle { color: rgba(255,255,255,0.7); font-size: 14px; margin-bottom: 24px; animation: fadeIn 0.6s ease-out 0.2s both; }
    #loading .slogan { color: rgba(255,255,255,0.8); font-size: 13px; animation: fadeIn 0.6s ease-out 0.3s both; }
    #loading .progress { margin-top: 32px; width: 160px; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; animation: fadeIn 0.6s ease-out 0.4s both; }
    #loading .progress-bar { height: 100%; background: white; border-radius: 2px; animation: progress 3s ease-out forwards; }
    #camera-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0; pointer-events: none; opacity: 0; transition: opacity 0.3s;
    }
    #camera-container.active { opacity: 1; pointer-events: auto; }
    #camera-video {
      width: 100%; height: 100%; object-fit: cover;
      transform: scaleX(-1);
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes progress { from { width: 0%; } to { width: 100%; } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo">вП?/div>
    <div class="title">Clocker</div>
    <div class="subtitle">дљ†жЙНжШѓйТЯ</div>
    <div class="slogan">дљ†зЪДи°МеК®йАЯеЇ¶пЉМеЖ≥еЃЪдљ†зЪДжЧґйЧіжµБйА?/div>
    <div class="progress"><div class="progress-bar"></div></div>
  </div>

  <div id="camera-container">
    <video id="camera-video" autoplay playsinline muted></video>
  </div>

  <script>
    window._flutterLoaderLoaded = false;
    window._cameraStream = null;

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (let registration of registrations) {
          registration.unregister();
        }
      }).catch(function() {});
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (let name of names) { caches.delete(name); }
        }).catch(function() {});
      }
    }

    window.startCamera = async function() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
          audio: false
        });
        window._cameraStream = stream;
        const video = document.getElementById('camera-video');
        video.srcObject = stream;
        document.getElementById('camera-container').classList.add('active');
        return true;
      } catch (e) {
        console.warn('Camera access denied:', e);
        return false;
      }
    };

    window.stopCamera = function() {
      if (window._cameraStream) {
        window._cameraStream.getTracks().forEach(function(t) { t.stop(); });
        window._cameraStream = null;
      }
      var video = document.getElementById('camera-video');
      video.srcObject = null;
      document.getElementById('camera-container').classList.remove('active');
    };

    window.setCameraOpacity = function(opacity) {
      var container = document.getElementById('camera-container');
      container.style.opacity = opacity;
    };

    window.setCameraMirror = function(mirror) {
      var video = document.getElementById('camera-video');
      video.style.transform = mirror ? 'scaleX(-1)' : 'scaleX(1)';
    };
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
