name: clocker
description: "用狭义相对论，根治拖延症 - 你的行动速度，决定你的时间流速"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.4
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.2+1
  path_provider: ^2.1.5
  path: ^1.9.0
  intl: ^0.20.2
  flutter_local_notifications: ^18.0.1
  audioplayers: ^6.1.0
  percent_indicator: ^4.2.3
  fl_chart: ^0.69.2
  uuid: ^4.5.1
  vibration: ^2.0.0
  wakelock_plus: ^1.2.8
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.3
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
